<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <form action="">

        <h1>Jorge Letelier</h1>
        <p>Por Favo ingrese los datos</p>

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Jorge" required>
        <br>

        <label for="apellidopaterno">Apellido Paterno:</label>
        <input type="text" id="apellidopaterno" name="apellidopaterno" placeholder="Letelier">
        <br>

        <label for="apellidomaterno">Apellido Materno:</label>
        <input type="text" id="apellidomaterno" name="apellidomaterno" placeholder="guichaman">
        <br>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="************">
        <br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" placeholder="33">
        <br>

        <label for="fecha">Fecha:</label>
        <input type="date" id="fecha" name="fecha">
        <br>
        <hr>
        <p>Seleccione su género</p>
        <div class="elDiv">

            <input type="radio" id="hombre" name="genero" value="hombre">
            <label for="hombre">Hombre</label>
            <br>

            <input type="radio" id="mujer" name="genero" value="mujer">
            <label for="mujer">Mujer</label>
            <br>

            <input type="radio" id="otro" name="genero" value="otro">
            <label for="otro">Otro</label>

            <input type="radio" id="binario" name="genero" value="binario">
            <label for="binario">Otro</label>


            <br>
            <br>

        </div>
        <hr>

        <label for="pais">Seleccione su País:</label>
        <select name="pais" id="pais">
            <option value="chile">Chile</option>
            <option value="argentina">Argentina</option>
            <option value="peru">Perú</option>
            <option value="brazil">Brazil</option>
            <option value="alemania">Alemania</option>
            <option value="bolivia">Bolivia</option>
            <option value="paraguay">Paraguay</option>
        </select>
        <br>
        <hr>
        <input type="submit" name="enviarFormulario" id="enviarFormulario" value="Enviar Formulario">
        <input type="submit" name="limpiarFormulario" id="limpiarFormulario" value="Limpiar Formulario">
    </form>

</body>

</html>
